name: Tests CI

# Déclencher le workflow
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      # 3. Installer les dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Lancer le linter
      - name: Run ESLint
        run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint # Les tests ne s'exécutent que si le linting réussit

    strategy:
      matrix:
        node-version: [22.x, 24.x, 25.x]

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # 3. Installer les dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Lancer les tests
      - name: Lancer les tests
        run: npm run test:run
